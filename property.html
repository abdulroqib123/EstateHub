<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EstateHub - Add Property</title>

  <!-- SEO -->
  <meta name="description" content="Add new properties to EstateHub" />
  <meta name="keywords" content="real estate, add property, estatehub" />
  <meta name="author" content="EstateHub Team" />
  <link rel="canonical" href="https://www.estatehub.com/property.html" />

  <!-- Open Graph -->
  <meta property="og:title" content="EstateHub - Add Property" />
  <meta property="og:description" content="Add new properties to EstateHub" />
  <meta property="og:type" content="website" />

  <!-- Styles -->
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="form.css">
</head>

<body>
  <!-- NAVBAR -->
  <nav>
    <div class="menu-icon" onclick="toggleSidebar()">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <h1 class="app-title">EstateHub</h1>
  </nav>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="nav-bar">
      <p class="nav-title">Navigation</p>
      <a class="anchor-nav-bar" href="home.html">Dashboard</a>
      <a class="anchor-nav-bar active" href="property.html">Add Property</a>
      <a class="anchor-nav-bar" href="login.html">Login / Signup</a>
    </div>
  </aside>

  <!-- PAGE CONTENT -->
  <main id="dashboard-content">
    <h2 class="page-title">Add Property</h2>

    <section id="add-property">
      <form id="propertyForm">
        <input type="text" id="type" placeholder="Property type (e.g. Apartment, Estate)" required />
        <input type="text" id="owner" placeholder="Owner's name" required />
        <input type="text" id="status" placeholder="Rented, Leased, For Sale" required />
        <input type="text" id="rent" placeholder="Amount e.g. 250000 or 100k" required />
        <input type="date" id="expiry" placeholder="Lease expiry date" required />
        <input type="text" id="tenants" placeholder="Tenant name(s)" />
        <textarea id="description" placeholder="Property description"></textarea>
      
        <button type="submit" class="submit-btn">Add Property</button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>EstateHub © 2025 — Manage With Confidence</p>
  </footer>

  <!-- SCRIPT (DO NOT TOUCH) -->
  <script>
    let getproperty = JSON.parse(localStorage.getItem("properties")) || [];

    const propertyForm = document.getElementById("propertyForm");
    propertyForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const type = document.getElementById("type").value;
      const owner = document.getElementById("owner").value;
      const status = document.getElementById("status").value;
      const rent = "₦" + document.getElementById("rent").value;
      const expiry = document.getElementById("expiry").value;
      const tenants = document.getElementById("tenants").value;
      const description = document.getElementById("description").value;

      const newProperty = { type, owner, status, rent, leaseExpiry: expiry, tenants, description };
      getproperty.push(newProperty);
      localStorage.setItem("properties", JSON.stringify(getproperty));

      window.location.href = "home.html";
    });

    function deleteProperty(index) {
      if (confirm("Are you sure?")) {
        getproperty.splice(index, 1);
        localStorage.setItem("properties", JSON.stringify(getproperty));
        renderCards();
      }
    }
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
