<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Org | PropDek</title>
   <!--SCYBUD UI-->
    <link rel="stylesheet" href="https://scybud.github.io/scybud-ui/css/variables.css">
    <link rel="stylesheet" href="https://scybud.github.io/scybud-ui/css/typography.css">
    <link rel="stylesheet" href="https://scybud.github.io/scybud-ui/css/animations.css">

    <!--APP SPECIFIC CSS-->
<link rel="stylesheet" href="https://loghue.com/css/base.css">
<link rel="stylesheet" href="https://loghue.com/css/component.css">
<link rel="stylesheet" href="https://loghue.com/css/utilities.css">

<link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://loghue.com/assets/icons/favicons/favicon-32x32.png"
    />
  <style>
    body {
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .loading {
      font-size: 18px;
      opacity: 0.7;
    }

    .error {
      color: #d33;
      font-weight: 600;
      margin-top: 10px;
    }

    .success {
      color: #2a8f2a;
      font-weight: 600;
      margin-top: 10px;
    }
.homeLink {
  display: none;
}
  </style>
</head>

<body>
  <div class="card">
    <h2>Joining Organisation</h2>
    <p id="status" class="loading">Please wait</p>
    <a class="homeLink" href="../dashboard">Go Home</a>
  </div>
  <script type="module">
  import { supabase } from "../../js/supabase.js";

  // --- THE DATA GRABBER ---
  // This looks at the browser address bar for "?token=..."
  const getUrlToken = () => {
    const params = new URLSearchParams(window.location.search);
    return params.get("token");
  };

  async function acceptInvite(token) {
    const status = document.getElementById("status");
const homeLink = document.querySelector(".homeLink")

    // Check if token exists before even trying Supabase
    if (!token) {
      status.textContent = "No invite token found.";
      status.className = "error";
      homeLink.classList.add("show")
      return;
    }

    // 1. Ensure user is logged in
    const { data: {user} , error: authError } = await supabase.auth.getUser();
    
    if (!user || authError) {
      // Save current URL so we can come back after login
      const redirectUrl = encodeURIComponent(window.location.href);
      window.location.href = `../../auth/login?redirect=${redirectUrl}`;
      return;
    }

    // 2. Fetch invite 
    const { data: invite, error: fetchError } = await supabase
      .from("organization_invitations")
      .select("*")
      .eq("token", token)
      .eq("status", "pending")
      .maybeSingle();

      if (fetchError) {
  console.error(fetchError);
  status.textContent = "Something went wrong while loading this invite.";
  status.className = "error";
        homeLink.classList.add("show")
  return;
}

if (!invite) {
  status.textContent = "This invite is no longer valid. Please request a new one.";
  status.className = "error";
        homeLink.classList.add("show")

  return;
}
console.log(user.id)
    // 3. Add user to org
    const { error: memberError } = await supabase
      .from("organization_members")
      .insert({
        organization_id: invite.organization_id,
        agent_id: user.id,
        role: invite?.role
      });

    if (memberError) {
      console.error("Member Error:", memberError);
      status.textContent = "You are already a member of this organization or there was a permission error.";
      status.className = "error";
            homeLink.classList.add("show")

      return;
    }


const { data, error } = await supabase
  .from("organization_invitations")
  .update({
    status: "accepted"
  })
  .eq("id", invite.id);

if(error) {
  console.log("error:", error)
}

    status.textContent = "Success! Redirecting...";
    status.className = "success";
      homeLink.classList.remove("show")

 setTimeout(() => {
    window.location.href = `../org?org=${invite.organization_id}`;
}, 1500);

  }
  // --- EXECUTION ---
  const token = getUrlToken();
  acceptInvite(token);
    
  </script>
</body>
</html>
