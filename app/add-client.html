<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <style>
            body, html {
                  margin: 0;
                  padding: 0;
            }



             div.dot-container {
        width: 100vw;
        height: 100vh;
        background-color: black;
        position: fixed;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 4px;
      }
      .dot-container span {
        width: 1rem;
        height: 1rem;
        background-color: #ffa500;
        border-radius: 50%;
        animation: bounce 1.5s linear infinite;
      }
      @keyframes bounce {
        0% {
          transform: translateY(0);
          opacity: 1;
        }
        50% {
          transform: translateY(6px);
          opacity: 0.5;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .dot-container span:nth-child(2) {
        animation-delay: 0.5s;
      }
      .dot-container span:nth-child(3) {
        animation-delay: 1s;
      }
      .dot-container.hide {
        display: none;
      }
      </style>
</head>
<body>
        <div class="dot-container">
            <span></span>
            <span></span>
            <span></span>
    </div>
    <script>
            const dotContainer = document.querySelector(".dot-container");

   window.addEventListener("load", () => {
     dotContainer.style.display = "none";
   });
    </script>
</body>
</html>
