  </head>
  <header class="header">
      <div class="menu-icon" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <h1>EstateHub</h1>
  </header>


    <aside id="sidebar" class="sidebar">
      <div id="nav-bar">
        <!--USE JS TO ADD NAV LINKS-->
      </div>

      <div class="sidebarBottom">
          <div class="userInfo">

            <div class="userInfoContent">
              <p id="userName" class="userName text-bold">Loading...</p>
              <p id="userEmail" class="userEmail">Loading...</p>
            </div>
          </div>

          <button type="button" class="logoutBtn" id="logoutBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" 
     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M15 3h4v18h-4" />
  <path d="M10 17l5-5-5-5" />
  <path d="M15 12H3" />
</svg>
</button>
        </div>
    </aside>
  <body>
    <div class="dot-container"></div>
         <!--TOAST MESSAGES-->
        <div id="toast"></div>
<!--MODAL CONTAINER-->
    <div id="modalContainer"></div>


    <div id="dashboard-content">
              <div class="section-header"><h2>Overview</h2></div>

      <section id="statsCards">
        <div id="allProperties" class="statsCard">
          <h3>Property Count</h3>
          <p id="allPropertiesCount">0</p>
        </div>
        <div id="rentedProperty" class="statsCard">
          <h3>Rented / Leased</h3>
          <p id="rentedPropertyCount">0</p>
        </div>
        <div id="availableProperty" class="statsCard">
          <h3>Available</h3>
          <p id="availablePropertyCount">0</p>
        </div>
      </section>
      <section id="property-table-section">
        <div class="section-header"><h2>Properties</h2> <button type="button" class="btn-primary btn add-property">Add Property</button></div>


        <div id="detailsCard"></div>
      </section>
    </div>

    <script type="module">
      import { initDashboard } from '../js/dashboard/dashboard.js';
      import { loadComponent } from "https://scybud.github.io/scybud-ui/js/ui.js";
      import { handleFormSteps } from "../js/create/add-property.js";

      document.addEventListener("DOMContentLoaded", () => {
          // Fire core dashboard fetch logic loops
          initDashboard();

          // Bind modal actions
          const addPropertyBtn = document.querySelectorAll(".add-property");
          addPropertyBtn.forEach((btn) => {
              btn.addEventListener("click", async () => {
                  await loadComponent(
                      "../components/modals/add-property.html",
                      "modalContainer"
                  );
                  await handleFormSteps();
              });
          });
      });
    </script>


<script type="module" src="../js/session.js"></script>
<script type="module" src="../js/app.js"></script>
        <script type="module" src="../js/auth/auth.js"></script>
    <script src="../js/components/nav.js"></script>
    <script src="../js/components/sidebar.js"></script>
  </body>
</html>
