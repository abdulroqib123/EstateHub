<html lang="en">
  <head>

      <link rel="stylesheet" href="../css/components/buttons.css">

    <!--FAVICONS-->
<link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png">

    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Page Styling */
      body {
        min-height: 100vh;
        width: 100%;
        font-family: "Poppins", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 15px;
      }

      /* Title */
      h2 {
        font-weight: 600;
        margin: var(--space-xl) 0 0;
        text-align: center;
      }

      /* Card Container */
      #details {
        margin-top: var(--space-xl);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 230, 0, 0.2);
        padding: 25px;
        width: 100%;
        max-width: 600px;
        border-radius: 12px;
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.4s ease-in-out;
          }

      /* Typography */
      #details h3 {
        font-size: 1.6rem;
        color: #ffe600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
        margin-bottom: 5px;
      }

      #details p {
        font-size: 0.95rem;
        line-height: 1.5;
        color: #e2e8f0;
      }

      strong {
        color: #ffdb4c;
        font-weight: 500;
      }

      /* Sub-units Section Style */
      .units-section {
        margin-top: 15px;
        border-top: 1px dashed rgba(255, 255, 255, 0.1);
        padding-top: 15px;
      }

      .units-section h4 {
        color: #ffe600;
        font-size: 1.1rem;
        margin-bottom: 10px;
      }

      .units-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
      }

      .unit-pill {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #333;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.85rem;
      }

      .unit-pill span {
        display: block;
        font-size: 0.75rem;
        color: #a0aec0;
        margin-top: 2px;
      }

      /* Back Button */
      .btn {
        position: fixed;
        left: var(--space-lg);

        padding: 12px 25px;
        border-radius: var(--radius-sm);
        border: none;
        color: #000;
        transition: transform 0.25s, box-shadow 0.25s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 10px rgba(255, 230, 0, 0.4);
      }

      /* Loading indicator placement */
      .loading-text {
        text-align: center;
        color: #a0aec0;
        font-style: italic;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Expanded max width to hold text and map gracefully side-by-side or stacked */
  #details {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 230, 0, 0.2);
    padding: 25px;
    width: 100%;
    max-width: 650px; /* Slight size bump for map layouts */
    border-radius: 12px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    animation: fadeIn 0.4s ease-in-out;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Map Container Placement styling */
  .map-section {
    position: relative;
    margin-top: 15px;
    border-top: 1px dashed rgba(255, 255, 255, 0.1);
    padding-top: 15px;
  }

  .map-section h4 {
    color: #ffe600;
    font-size: 1.1rem;
    margin-bottom: 10px;
  }
.expand-btn {
  position: absolute;
  top: 0;
  right: 0;
}
  .map-frame-wrapper {
    width: 100%;
    height: 250px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: #151515;
  }

  .map-frame-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    /* Optional sleek dark layout filter blend to match your theme perfectly */
    filter: invert(90%) hue-rotate(180deg) brightness(95%) contrast(90%);
  }

  .map-modal-card {
    width: 90%;
    height: 90%;
    padding: var(--space-xl);
    position: relative;
  }

  @media (max-width: 600px) {
    .map-modal-card {
    width: 100%;
    padding: var(--space-sm);
  }
  }
  .expanded-map-frame-wrapper {
     width: 100%;
    height: 100%;
    border-radius: 8px;
    overflow: hidden;
  }
  .expanded-map-frame-wrapper iframe {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    overflow: hidden;
  }
    </style>
  </head>
  <body>

    <!--TOAST MESSAGES-->
        <div id="toast"></div>
<!--MODAL CONTAINER-->
    <div id="modalContainer"></div>


    <button type="button" class="btn backBtn btn-sm">← Back</button>
    <h2>Property Details</h2>

    <div id="details">
      <p class="loading-text">Fetching live database record...</p>
    </div>


    <script type="module" src="../js/session.js"></script>
<script type="module" src="../js/app.js"></script>
        <script type="module" src="../js/auth/auth.js"></script>
    <script type="module" src="../js/dashboard/propertyDetails.js"></script>
  </body>
</html>
