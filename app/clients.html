    <div id="app-content">
              <div class="section-header"><h2>My Clients</h2> <button type="button" class="btn-primary btn-sm btn add-client"><svg
  width="24"
  height="24"
  viewBox="0 0 24 24"

>

  />
</svg>
Add client</button></div>

    <script type="module">
      import { initClients } from '../js/clients/clients.js';
      import { loadComponent } from "https://scybud.github.io/scybud-ui/js/ui.js";
      import { handlePersonalClientSubmit } from "../js/create/add-client.js"
import { sessionState, sessionReady } from "../js/session.js"

      document.addEventListener("DOMContentLoaded", async () => {
          // Fire core dashboard fetch logic loops
          initClients();
await sessionReady;

          const user = await sessionState.user;

          // Bind modal actions
          const addClientBtn = document.querySelectorAll(".add-client");
          addClientBtn.forEach((btn) => {
              btn.addEventListener("click", async () => {
                  await loadComponent(
                      "../components/modals/create/add-client.html",
                      "modalContainer"
                  );
 await handlePersonalClientSubmit(user.id, async () => {
         await initClients();
        });
            });
          });
      });
    </script>


<script type="module" src="../js/session.js"></script>
