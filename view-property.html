<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>EstateHub | Property Details</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Page Styling */
      body {
        background: linear-gradient(180deg, #0a0a0a, #252525);
        min-height: 100vh;
        width: 100%;
        font-family: "Poppins", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #fff;
        padding: 30px 15px;
      }

      /* Title */
      h2 {
        font-size: 2rem;
        font-weight: 600;
        background: linear-gradient(90deg, #ffe600, #ffad00);
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 20px;
        text-align: center;
      }

      /* Card Container */
      #details {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 230, 0, 0.3);
        padding: 25px;
        width: 90%;
        max-width: 600px;
        border-radius: 12px;
        backdrop-filter: blur(6px);
        box-shadow: 0 0 15px rgba(255, 230, 0, 0.2);
        animation: fadeIn 0.6s ease-in-out;
      }

      /* Each property line */
      #details p,
      #details h3 {
        font-size: 1rem;
        margin-bottom: 10px;
      }

      #details h3 {
        font-size: 1.4rem;
        margin-bottom: 15px;
        color: #ffe600;
      }

      strong {
        color: #ffdb4c;
      }

      /* Back Button */
      button {
        margin-top: 25px;
        padding: 12px 25px;
        border-radius: 8px;
        font-size: 1rem;
        border: none;
        background: linear-gradient(90deg, #ffe600, #ffad00);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.25s, box-shadow 0.25s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
      }

      /* Fade in Animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <h2>Property Details</h2>

    <div id="details"></div>

    <button onclick="goBack()">← Back to Dashboard</button>

    <script>
      const property = JSON.parse(localStorage.getItem("viewProperty"));
      const detailsDiv = document.getElementById("details");

      const tenants = Array.isArray(property.tenants)
        ? property.tenants.join(", ")
        : property.tenants && property.tenants.trim() !== ""
        ? property.tenants
        : "[Vacant]";

      detailsDiv.innerHTML = `
        <h3>${property.type}</h3>
        <p><strong>Owner:</strong> ${property.owner}</p>
        <p><strong>Tenants:</strong> ${tenants}</p>
        <p><strong>Status:</strong> ${property.status}</p>
        <p><strong>Rent/Value:</strong> ${property.rent}</p>
        <p><strong>Description:</strong> ${property.description || "-"}</p>
      `;

      function goBack() {
        window.location.href = "home.html";
      }
    </script>
  </body>
</html>
