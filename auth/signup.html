<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | PropDek</title>

     <!--SCYBUD UI-->
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/variables.css"
    />
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/typography.css"
    />
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/components/buttons/global-buttons.css"
    />
<link rel="stylesheet" href="https://scybud.github.io/scybud-ui/css/animations.css">


    <!--APP CSS-->
    <link rel="stylesheet" href="../css/components/toast.css">
        <link rel="stylesheet" href="../css/auth.css" />

        <!--FAVICONS-->
<link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png">
  </head>
  
  <body>
    <div class="dot-container">
    </div>
    <main>

      <div id="toast"></div>
        <!--
        <h1>Welcome To <span class="logo">Prop<span>Dek</span></span></h1>
        -->
      <!--SIGNUP FORM-->
      <form id="signupForm">
        <h2>Signup</h2>
        <fieldset>
          <legend>Personal Details</legend>
          <label for="firstName">First name:</label>
          <input
            type="text"
            id="firstName"
            placeholder="e.g. Abdulroqib"
            required
          />
          <label for="lastName">Last name:</label>
          <input
            type="text"
            id="lastName"
            placeholder="e.g Oladipo"
            required
          />
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            placeholder="example@company.com"
            required
          />
        </fieldset>
        <fieldset>
          <legend>Security</legend>
          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            placeholder="Enter Your password"
            required
          />
          <label for="confirmPassword">Confirm password:</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Your password"
            required
          />
        </fieldset>
        <button type="submit">Signup</button>
        <p>Have an account? <a id="loginLink" href="login">Login</a></p>
      </form>

    </main>

    <script type="module" src="../js/auth/auth.js"></script>
<script type="module" src="../js/auth/signup.js"></script>
  </body>
</html>
