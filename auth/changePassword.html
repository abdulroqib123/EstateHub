<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | PropDek</title>

    <!--SCYBUD UI-->
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/variables.css"
    />
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/layout.css"
    />
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/typography.css"
    />

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/form.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />

    <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicons/favicon-16x16.png"
    />

    <style>
      .form {
        margin-top: 50px;
      }
    </style>
  </head>

  <body>
    <!--RESET PASSWORD EMAIL FORM-->
    <div class="step-indicator" data-step="2" data-total="2">
      <div class="step-indicator-bar-container">
        <div class="step-bar step-2"></div>
      </div>
    </div>

    <main class="main">
      <form class="form" id="passwordChangeForm">
        <h2>Reset Password</h2>
        <label for="passwordResetNewPassword">New Password</label>
        <div class="singleInput">
          <input
            type="password"
            name="passwordResetNewPassword"
            id="passwordResetNewPassword"
            class="inputField"
            placeholder="Your new password"
            required
          />
          <button
            class="btn"
            id="passwordResetNewPasswordSubmitBtn"
            type="submit"
          >
            Submit
          </button>
        </div>
      </form>
    </main>

    <script type="module" src="../js/session.js"></script>
    <script type="module" src="../js/auth/resetPassword.js"></script>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>
