<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | PropDek</title>

    <!--SCYBUD UI-->
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/variables.css"
    />
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/layout.css"
    />
    <link
      rel="stylesheet"
      href="https://scybud.github.io/scybud-ui/css/typography.css"
    />

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/form.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />

    <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicons/favicon-16x16.png"
    />

    <style>
      .backBtn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: sticky;
        top: 40px;
        left: 20px;
        padding: 0 auto;
        width: fit-content;
        background: none;
        color: var(--link);
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .backBtn:hover {
        background: var(--bg-hover);
        opacity: 0.8;
        transform: translate(-2px);
      }

      .backBtn:active {
        transform: translate(-10px);
      }

      .success-card {
        display: none;
        max-width: 420px;
        margin: 24px auto;
        padding: 20px 22px;
        border-radius: 14px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        gap: 14px;
        align-items: flex-start;
        color: #e5e7eb;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          sans-serif;
      }
      .success-card.showFlex {
        display: flex;
      }
      .success-icon {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at 30% 0,
          #bbf7d0 0,
          #22c55e 40%,
          var(--secondary)
        );
        color: #022c22;
        font-weight: 700;
        font-size: 18px;
        flex-shrink: 0;
      }

      .success-content {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .success-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .success-text {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: #9ca3af;
      }

      .success-button {
        margin-top: 10px;
        align-self: flex-start;
        padding: 7px 14px;
        border-radius: 999px;
        border: none;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        background: var(--secondary);
        color: var(--bg);
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          background 0.12s ease;
      }

      .success-button:hover {
        text-decoration: none;
        opacity: 0.7;
        transform: translateY(-1px);
      }

      .success-button:active {
        transform: translateY(0);
        box-shadow: 0 6px 16px var(--secondary);
      }

      .form {
        margin-top: 50px;
      }
    </style>
  </head>

  <body>
    <button type="button" class="btn backBtn btn-sm">
      <!-- Back Icon -->
      <svg
        width="20"
        height="20"
        viewBox="0 0 20 20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M11.75 4.25L6 10L11.75 15.75"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span>Back</span>
    </button>

    <div class="step-indicator" data-step="1" data-total="2">
      <div class="step-indicator-bar-container">
        <div class="step-bar step-1"></div>
      </div>
    </div>
    <main class="main">
      <!--RESET PASSWORD EMAIL FORM-->
      <form class="form" id="passwordResetEmailForm">
        <h2>Reset Password</h2>
        <p class="text-sm text-center">Enter the email you used to register on PropDek</p>
        <label for="passwordResetEmail">Email</label>
        <div class="singleInput">
          <input
            type="email"
            name="passwordResetEmail"
            id="passwordResetEmail"
            class="inputField"
            placeholder="e.g. example@gmail.com"
            required
          />
          <button class="btn" id="passwordResetEmailSubmitBtn" type="submit">
            Submit
          </button>
        </div>
      </form>

      <!--IMPLEMENT THIS SUCCESS MESSAGE-->
      <div class="success-card">
        <div class="success-icon">âœ“</div>
        <div class="success-content">
          <h2 class="success-title">Password reset email sent!</h2>
          <p class="success-text">
            A link has been sent to your email. Continue with the link to update
            your password.
          </p>
          <a
            href="https://mail.google.com/mail/u/0/#all"
            class="success-button"
          >
            Open Gmail
          </a>
        </div>
      </div>
    </main>

    <script type="module" src="../js/auth/resetPassword.js"></script>
    <script type="module" src="../js/app.js"></script>

    <script>
      const backBtn = document.querySelector(".backBtn");

      if (backBtn) {
        backBtn.addEventListener("click", () => {
          window.history.back();
        });
      }
    </script>
  </body>
</html>
