<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="home.css" />
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <header>
      <nav style="display: inline-flex">
        <div class="menu-icon" onclick="toggleSidebar()">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <h1>EstateHub</h1>
      </nav>
      <aside id="sidebar">
        <div id="nav-bar">
          <p style="text-align: center; color: white">Navigate</p>
          <a class="anchor-nav-bar" href="home.html">Dashboard</a>
          <a href="property.html" class="anchor-nav-bar">Add Property</a>
          <a class="anchor-nav-bar" href="Login.html">Login/Signup</a>
        </div>
      </aside>
    </header>
    <main>
      <h1>Login To EstateHub</h1>
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="e.g Alice Bora" />
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="youremail@gmail.com" />
        <fieldset>
          <legend>Password</legend>
          <label for="password">Enter Password:</label>
          <input
            type="password"
            id="password"
            placeholder="Enter Your password"
          />
          <label for="confirmPassword">Confirm Password:</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Your password"
          />
        </fieldset>
        <button type="submit">Login</button>
        <p>Have an account? <a href="#">Login</a></p>
      </form>
    </main>
    <script src="sidebar.js"></script>
  </body>
</html>
